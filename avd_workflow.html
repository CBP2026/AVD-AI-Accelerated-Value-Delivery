<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;

    --border: #1e1e2e;
    --accent1: #00e5a0;
    --accent2: #4d9fff;
    --accent3: #ff6b6b;
    --accent4: #f5a623;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --phase1: #00e5a0;
    --phase2: #4d9fff;
    --phase3: #c084fc;

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 48px 32px;
    overflow-x: hidden;
  }
